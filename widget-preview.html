<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Widget Preview</title>
<style>body{font-family:sans-serif;background:#F5EFE4;padding:60px;color:#182B3A;}</style>
</head><body>
<h1>This is a preview page</h1>
<p>Try: (1) dragging it side-to-side quickly to see the shake/spin reaction, (2) leaving it alone for ~20 seconds to see it doze off with "z z z", (3) tap it to open the chat.</p>
<!-- ==================================================================
     NOMAD'S NEST HOSTEL — CHATBOT WIDGET (drop-in)
     Paste this WHOLE block just before the closing </body> tag of
     your friend's webpage. That's it — nothing else needs to change.
     ================================================================== -->

<style>
  #nn-chat-launcher{
    position:fixed; top:calc(100vh - 84px); left:calc(100vw - 84px);
    width:62px; height:62px; border-radius:50%;
    background:#182B3A; border:none; cursor:grab;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 28px rgba(24,43,58,.32);
    transition:box-shadow .18s ease;
    z-index:99999;
    touch-action:none;
    user-select:none;
  }
  #nn-chat-launcher.nn-dragging{ cursor:grabbing; box-shadow:0 16px 36px rgba(24,43,58,.42); }
  #nn-chat-launcher:hover{ transform:scale(1.05); }
  #nn-chat-launcher:hover .nn-bot-antenna{ transform:rotate(-8deg); }
  #nn-chat-launcher svg{ width:38px; height:38px; overflow:visible; }
  #nn-chat-launcher .nn-dot{
    position:absolute; top:5px; right:5px;
    width:11px; height:11px; background:#D9634A;
    border-radius:50%; border:2px solid #F5EFE4;
  }
  .nn-bot-antenna{ transform-origin:12px 6px; transition:transform .25s ease; }
  .nn-bot-antenna-tip{ animation:nn-bob 2.4s ease-in-out infinite; transform-origin:12px 3px; }
  .nn-bot-eye{ animation:nn-blink 4.5s ease-in-out infinite; transform-origin:center; }
  .nn-bot-eye.nn-right{ animation-delay:.08s; }
  @keyframes nn-bob{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-1px) rotate(4deg); }
  }
  @keyframes nn-blink{
    0%,88%,100%{ transform:scaleY(1); }
    92%{ transform:scaleY(0.15); }
  }

  /* ---- face states: awake (default) / sleepy (idle) / dizzy (shaken) ---- */
  .nn-face-sleepy, .nn-face-dizzy{ display:none; }
  #nn-chat-launcher.nn-sleepy .nn-face-awake{ display:none; }
  #nn-chat-launcher.nn-sleepy .nn-face-sleepy{ display:block; }
  #nn-chat-launcher.nn-dizzy .nn-face-awake{ display:none; }
  #nn-chat-launcher.nn-dizzy .nn-face-dizzy{ display:block; }

  .nn-zzz{
    position:absolute; top:-14px; right:-6px;
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600;
    color:#7FE0C9; opacity:0; pointer-events:none;
  }
  #nn-chat-launcher.nn-sleepy .nn-zzz{ animation:nn-zzz-float 2.4s ease-in-out infinite; }
  @keyframes nn-zzz-float{
    0%{ opacity:0; transform:translateY(4px) scale(.7); }
    25%{ opacity:1; transform:translateY(-4px) scale(1); }
    70%{ opacity:0; transform:translateY(-16px) scale(1.1); }
    100%{ opacity:0; transform:translateY(-16px) scale(1.1); }
  }

  /* ---- shake reaction: playful spin + wobble ---- */
  #nn-chat-launcher.nn-shake{ animation:nn-shake-spin .7s ease-in-out; }
  @keyframes nn-shake-spin{
    0%{ transform:rotate(0deg) scale(1); }
    15%{ transform:rotate(-18deg) scale(1.06); }
    35%{ transform:rotate(300deg) scale(1.1); }
    55%{ transform:rotate(340deg) scale(1.06); }
    75%{ transform:rotate(370deg) scale(1.08); }
    100%{ transform:rotate(360deg) scale(1); }
  }

  #nn-chat-panel{
    position:fixed;
    width:340px; max-width:calc(100vw - 32px);
    height:480px; max-height:calc(100vh - 120px);
    background:#FFFDF9; border-radius:16px;
    box-shadow:0 24px 60px rgba(24,43,58,.32);
    display:none; flex-direction:column; overflow:hidden;
    z-index:99999; border:1px solid rgba(24,43,58,.14);
    font-family:'Inter',Arial,sans-serif;
  }
  #nn-chat-panel.nn-open{ display:flex; }

  #nn-chat-header{
    background:#182B3A; color:#F5EFE4; padding:14px 16px;
    display:flex; align-items:center; justify-content:space-between;
  }
  #nn-chat-header .nn-tag{
    font-size:10px; letter-spacing:.1em; text-transform:uppercase;
    color:#E3A23C; display:block; margin-bottom:2px;
  }
  #nn-chat-header h2{ font-size:16px; margin:0; font-weight:600; }
  #nn-chat-close{ background:none; border:none; color:#F5EFE4; opacity:.7; cursor:pointer; }
  #nn-chat-close:hover{ opacity:1; }

  #nn-chat-body{
    flex:1; overflow-y:auto; padding:14px;
    display:flex; flex-direction:column; gap:10px;
    background:#F5EFE4;
  }
  .nn-msg{ max-width:82%; padding:9px 12px; border-radius:13px; font-size:14px; line-height:1.45; }
  .nn-msg.nn-bot{ background:#FFFDF9; border:1px solid rgba(24,43,58,.14); border-bottom-left-radius:4px; align-self:flex-start; }
  .nn-msg.nn-user{ background:#2C6E63; color:#fff; border-bottom-right-radius:4px; align-self:flex-end; }
  .nn-msg b{ color:#D9634A; }

  .nn-chips{ display:flex; flex-wrap:wrap; gap:6px; align-self:flex-start; max-width:95%; }
  .nn-chip{
    font-size:11px; background:#FFFDF9; border:1px solid #182B3A;
    border-radius:999px; padding:5px 10px; cursor:pointer;
  }
  .nn-chip:hover{ background:#182B3A; color:#F5EFE4; }

  .nn-typing{ align-self:flex-start; display:flex; gap:4px; padding:10px 12px; background:#FFFDF9; border:1px solid rgba(24,43,58,.14); border-radius:13px; border-bottom-left-radius:4px; }
  .nn-typing span{ width:5px; height:5px; border-radius:50%; background:#182B3A; opacity:.4; animation:nn-blink 1.1s infinite; }
  .nn-typing span:nth-child(2){ animation-delay:.15s; }
  .nn-typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes nn-blink{ 0%,80%,100%{opacity:.25} 40%{opacity:.9} }

  #nn-chat-input-row{ display:flex; gap:8px; padding:10px; border-top:1px solid rgba(24,43,58,.14); background:#fff; }
  #nn-chat-input{ flex:1; border:1px solid rgba(24,43,58,.14); border-radius:999px; padding:10px 14px; font-size:13.5px; outline:none; background:#F5EFE4; color:#182B3A; }
  #nn-chat-input:focus{ border-color:#2C6E63; }
  #nn-chat-send{ width:38px; height:38px; border-radius:50%; border:none; background:#D9634A; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  #nn-chat-send:hover{ background:#c5543d; }
</style>

<!-- Launcher button: robot face icon -->
<button id="nn-chat-launcher" aria-label="Open chat">
  <svg viewBox="0 0 24 26" fill="none">
    <!-- antenna -->
    <g class="nn-bot-antenna">
      <line x1="12" y1="6" x2="12" y2="3" stroke="#F5EFE4" stroke-width="1.6" stroke-linecap="round"></line>
      <circle class="nn-bot-antenna-tip" cx="12" cy="2.4" r="1.5" fill="#E3A23C"></circle>
    </g>
    <!-- ears -->
    <rect x="1.5" y="11.5" width="2.6" height="5" rx="1.3" fill="#E3A23C"></rect>
    <rect x="19.9" y="11.5" width="2.6" height="5" rx="1.3" fill="#E3A23C"></rect>
    <!-- head -->
    <rect x="4" y="7.5" width="16" height="14" rx="6" fill="none" stroke="#F5EFE4" stroke-width="1.6"></rect>
    <!-- face plate -->
    <rect x="6.3" y="10.5" width="11.4" height="8" rx="4" fill="#0F1F2B"></rect>

    <!-- AWAKE face (default) -->
    <g class="nn-face-awake">
      <ellipse class="nn-bot-eye nn-left" cx="9.7" cy="14.5" rx="1.15" ry="1.5" fill="#7FE0C9"></ellipse>
      <ellipse class="nn-bot-eye nn-right" cx="14.3" cy="14.5" rx="1.15" ry="1.5" fill="#7FE0C9"></ellipse>
      <path d="M9.8 16.9c.9.75 3.5.75 4.4 0" stroke="#7FE0C9" stroke-width="1.1" stroke-linecap="round" fill="none"></path>

    <!-- SLEEPY face (idle too long) -->
    <g class="nn-face-sleepy">
      <path d="M8.6 14.5c.6-.6 1.8-.6 2.4 0" stroke="#7FE0C9" stroke-width="1.1" stroke-linecap="round" fill="none"></path>
      <path d="M13.2 14.5c.6-.6 1.8-.6 2.4 0" stroke="#7FE0C9" stroke-width="1.1" stroke-linecap="round" fill="none"></path>
      <path d="M10.4 17.1c.5.4 1.9.4 2.4 0" stroke="#7FE0C9" stroke-width="1" stroke-linecap="round" fill="none"></path>
    </g>

    <!-- DIZZY face (just got shaken) -->
    <g class="nn-face-dizzy">
      <path d="M8.7 13.6l1.7 1.7M10.4 13.6l-1.7 1.7" stroke="#7FE0C9" stroke-width="1" stroke-linecap="round"></path>
      <path d="M13.4 13.6l1.7 1.7M15.1 13.6l-1.7 1.7" stroke="#7FE0C9" stroke-width="1" stroke-linecap="round"></path>
      <ellipse cx="12" cy="17" rx="1.1" ry="0.8" stroke="#7FE0C9" stroke-width="1" fill="none"></ellipse>
    </g>
  </svg>
  <span class="nn-zzz">z z z</span>
  <span class="nn-dot"></span>
</button>

<!-- Chat panel -->
<div id="nn-chat-panel">
  <div id="nn-chat-header">
    <div>
      <span class="nn-tag">Front Desk Bot</span>
      <h2>Nomad's Nest Hostel</h2>
    </div>
    <button id="nn-chat-close" aria-label="Close chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <div id="nn-chat-body"></div>
  <div id="nn-chat-input-row">
    <input id="nn-chat-input" type="text" placeholder="Ask about rooms, prices, check-in…" autocomplete="off">
    <button id="nn-chat-send" aria-label="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<script>
/* =========================================================
   EDIT THIS SECTION to match your real hostel's details
   ========================================================= */
const NN_HOSTEL = {
  name: "Nomad's Nest Hostel",
  faqs: [
    { keywords:["room","dorm","bed","private","types","options"],
      answer:"We've got three room types: <b>6-bed mixed dorm</b> ($18/night), <b>4-bed female dorm</b> ($21/night), and <b>private double</b> ($52/night)." },
    { keywords:["price","cost","rate","fee","how much","budget"],
      answer:"Prices start at <b>$18/night</b> for a dorm bed and go up to <b>$52/night</b> for a private double. Stay 5+ nights for 10% off." },
    { keywords:["check in","checkin","check-in","arrival","arrive"],
      answer:"Check-in is from <b>2:00 PM</b>, and reception is staffed <b>24 hours</b>." },
    { keywords:["check out","checkout","check-out","leave","departure"],
      answer:"Checkout is by <b>11:00 AM</b>. Late checkout until 2 PM is $8, subject to availability." },
    { keywords:["wifi","wi-fi","internet"],
      answer:"Free high-speed Wi-Fi covers the whole building — password is on your key card sleeve." },
    { keywords:["breakfast","food","kitchen","eat","meal"],
      answer:"Continental breakfast is included until 10 AM. Guest kitchen is open 24/7." },
    { keywords:["amenities","facilities","offer","have","terrace","laundry","lounge"],
      answer:"On-site: rooftop terrace, guest kitchen, lounge, laundry ($4/load), and bike rental ($10/day)." },
    { keywords:["location","address","where","directions","near"],
      answer:"We're at <b>14 Harbor Lane</b>, 8 minutes' walk from the train station." },
    { keywords:["rule","curfew","noise","policy","quiet","alcohol","smoking"],
      answer:"No curfew. Quiet hours are 11 PM–7 AM in dorms. Smoking only on the rooftop terrace." },
    { keywords:["cancel","refund","cancellation"],
      answer:"Free cancellation up to 48 hours before check-in." },
    { keywords:["contact","phone","email","call","reach"],
      answer:"Reach the front desk at <b>+1 (555) 019-2244</b> or <b>stay@nomadsnest.example</b>." },
    { keywords:["pet","dog","cat","animal"],
      answer:"Sorry, no pets — service animals are always welcome." },
    { keywords:["book","reservation","reserve","available","availability"],
      answer:"You can book directly through our website's booking page!" }
  ],
  greetings:["hi","hello","hey","yo","sup","good morning","good afternoon","good evening"],
  thanks:["thanks","thank you","thx","cheers","appreciate"],
  bye:["bye","goodbye","see you","later"]
};
const NN_CHIPS = ["Room prices","Check-in time","Wifi","Location"];

/* ========================================================= */

function nnFindAnswer(rawText){
  const text = rawText.toLowerCase();
  if (NN_HOSTEL.greetings.some(g => text.includes(g)))
    return `Hey there! 👋 I'm the front-desk bot for <b>${NN_HOSTEL.name}</b>. Ask me about rooms, prices, check-in, amenities, or location.`;
  if (NN_HOSTEL.thanks.some(g => text.includes(g)))
    return "Anytime! Let me know if there's anything else. 🎒";
  if (NN_HOSTEL.bye.some(g => text.includes(g)))
    return "Safe travels! ✈️";

  let best = null, bestScore = 0;
  for (const faq of NN_HOSTEL.faqs) {
    let score = 0;
    for (const kw of faq.keywords) if (text.includes(kw)) score += kw.split(" ").length;
    if (score > bestScore) { bestScore = score; best = faq; }
  }
  if (best && bestScore > 0) return best.answer;
  return "I don't have that one on file — but our 24hr front desk can help directly. Try asking about rooms, prices, check-in, amenities, rules, or location!";
}

(function(){
  const launcher = document.getElementById('nn-chat-launcher');
  const panel = document.getElementById('nn-chat-panel');
  const closeBtn = document.getElementById('nn-chat-close');
  const body = document.getElementById('nn-chat-body');
  const input = document.getElementById('nn-chat-input');
  const sendBtn = document.getElementById('nn-chat-send');

  /* ---------- Drag the launcher anywhere on screen (+ shake detection) ---------- */
  let dragging = false, moved = false, startX, startY, startLeft, startTop;
  let lastX = null, lastDx = 0, reversalCount = 0, lastReversalReset = 0;

  function clampToViewport(left, top){
    const size = launcher.offsetWidth;
    const maxLeft = window.innerWidth - size - 6;
    const maxTop = window.innerHeight - size - 6;
    return {
      left: Math.min(Math.max(6, left), maxLeft),
      top: Math.min(Math.max(6, top), maxTop)
    };
  }

  function pointerDown(x, y){
    dragging = true; moved = false;
    startX = x; startY = y; lastX = x; lastDx = 0; reversalCount = 0; lastReversalReset = Date.now();
    const rect = launcher.getBoundingClientRect();
    startLeft = rect.left; startTop = rect.top;
    launcher.classList.add('nn-dragging');
    wake();
  }
  function pointerMove(x, y){
    if (!dragging) return;
    const dx = x - startX, dy = y - startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
    const { left, top } = clampToViewport(startLeft + dx, startTop + dy);
    launcher.style.left = left + 'px';
    launcher.style.top = top + 'px';

    // shake detection: count quick left-right direction reversals
    const stepDx = x - lastX;
    if (Math.abs(stepDx) > 3) {
      if (lastDx !== 0 && Math.sign(stepDx) !== Math.sign(lastDx)) reversalCount++;
      lastDx = stepDx;
    }
    lastX = x;
    const now = Date.now();
    if (now - lastReversalReset > 700) { reversalCount = 0; lastReversalReset = now; }
    if (reversalCount >= 3) { triggerShake(); reversalCount = 0; }
  }
  function pointerUp(){
    if (!dragging) return;
    dragging = false;
    launcher.classList.remove('nn-dragging');
    if (!moved) openPanel();      // it was a tap, not a drag
    else positionPanelNearLauncher();
  }

  function triggerShake(){
    launcher.classList.remove('nn-shake'); // restart animation if already running
    void launcher.offsetWidth;             // force reflow so the animation replays
    launcher.classList.add('nn-dizzy', 'nn-shake');
    setTimeout(() => launcher.classList.remove('nn-dizzy', 'nn-shake'), 700);
  }

  launcher.addEventListener('mousedown', e => { pointerDown(e.clientX, e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', pointerUp);

  launcher.addEventListener('touchstart', e => {
    const t = e.touches[0]; pointerDown(t.clientX, t.clientY);
  }, { passive:true });
  window.addEventListener('touchmove', e => {
    if (!dragging) return;
    const t = e.touches[0]; pointerMove(t.clientX, t.clientY);
  }, { passive:true });
  window.addEventListener('touchend', pointerUp);

  window.addEventListener('resize', () => {
    const rect = launcher.getBoundingClientRect();
    const { left, top } = clampToViewport(rect.left, rect.top);
    launcher.style.left = left + 'px';
    launcher.style.top = top + 'px';
  });

  /* ---------- Idle sleep: robot dozes off after inactivity, wakes on interaction ---------- */
  const IDLE_MS = 20000; // time with no interaction before it falls asleep
  let idleTimer = null;

  function sleep(){ launcher.classList.add('nn-sleepy'); }
  function wake(){
    launcher.classList.remove('nn-sleepy');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(sleep, IDLE_MS);
  }
  ['mousedown','touchstart','keydown','click'].forEach(evt =>
    document.addEventListener(evt, wake, { passive:true })
  );
  wake(); // start the timer on page load

  /* ---------- Position the panel next to wherever the button is ---------- */
  function positionPanelNearLauncher(){
    const rect = launcher.getBoundingClientRect();
    const panelW = 340, panelH = 480;
    let left = rect.left;
    let top = rect.top - panelH - 10;          // prefer opening above the button

    if (top < 10) top = rect.bottom + 10;       // not enough room above -> open below
    if (left + panelW > window.innerWidth - 10) left = window.innerWidth - panelW - 10;
    if (left < 10) left = 10;
    if (top + panelH > window.innerHeight - 10) top = window.innerHeight - panelH - 10;
    if (top < 10) top = 10;

    panel.style.left = left + 'px';
    panel.style.top = top + 'px';
  }

  function openPanel(){
    positionPanelNearLauncher();
    panel.classList.add('nn-open');
    if (body.children.length === 0) {
      addMessage(`Hi! I'm the front-desk bot for <b>${NN_HOSTEL.name}</b>. Ask me anything about your stay 🧳`, 'bot');
      addChips();
    }
    input.focus();
  }

  /* ---------- Chat logic ---------- */
  function addMessage(text, sender){
    const div = document.createElement('div');
    div.className = 'nn-msg nn-' + sender;
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }
  function addChips(){
    const wrap = document.createElement('div');
    wrap.className = 'nn-chips';
    NN_CHIPS.forEach(label => {
      const chip = document.createElement('button');
      chip.className = 'nn-chip';
      chip.textContent = label;
      chip.onclick = () => { input.value = label; sendMessage(); };
      wrap.appendChild(chip);
    });
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
  }
  function showTyping(){
    const t = document.createElement('div');
    t.className = 'nn-typing'; t.id = 'nn-typing-indicator';
    t.innerHTML = '<span></span><span></span><span></span>';
    body.appendChild(t); body.scrollTop = body.scrollHeight;
  }
  function hideTyping(){ const t = document.getElementById('nn-typing-indicator'); if (t) t.remove(); }

  function sendMessage(){
    const text = input.value.trim();
    if (!text) return;
    wake();
    addMessage(text, 'user');
    input.value = '';
    showTyping();
    setTimeout(() => { hideTyping(); addMessage(nnFindAnswer(text), 'bot'); }, 500 + Math.random()*400);
  }

  closeBtn.addEventListener('click', () => panel.classList.remove('nn-open'));
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
})();
</script>
</body></html>
