// custom facts (room types, fees, warden contact, location).
const NN_ALL_TOPICS = [...NN_RULES_FAQS, ...NN_HOSTEL.faqs];

const NN_STOPWORDS = new Set("a an the is are am was were be been being do does did i my me you your in on at to of for if can could should would will shall must have has had what when where who why how there here this that these those it its any allowed need needed permit permitted policy rule rules time times get got about with without into from as or and but not no yes so please tell during after before happen happens hostel".split(" "));

function nnTokenize(text){
  return text.toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(w => w.length > 1 && !NN_STOPWORDS.has(w));
}

/* =========================================================
   SOUND EFFECTS — synthesized with the Web Audio API, so no
   external audio files are needed. Toggle with the 🔊 button.
   ========================================================= */
let nnAudioCtx = null;
let nnSoundOn = true;

function nnEnsureAudio(){
  if (!nnAudioCtx) {
    try { nnAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { nnAudioCtx = null; }
  }
  if (nnAudioCtx && nnAudioCtx.state === 'suspended') nnAudioCtx.resume();
}

function nnTone(freq, duration, type='sine', gainLevel=0.12, sweepTo=null, delay=0){
  if (!nnSoundOn) return;
  nnEnsureAudio();
  if (!nnAudioCtx) return;
  const t0 = nnAudioCtx.currentTime + delay;
  const osc = nnAudioCtx.createOscillator();
  const gain = nnAudioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (sweepTo) osc.frequency.exponentialRampToValueAtTime(sweepTo, t0 + duration);
  gain.gain.setValueAtTime(gainLevel, t0);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain).connect(nnAudioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + duration);
}

const nnSfx = {
  open:    () => { nnTone(660, 0.09, 'sine', 0.12); nnTone(880, 0.12, 'sine', 0.12, null, 0.08); },
  send:    () => nnTone(520, 0.06, 'square', 0.05),
  receive: () => nnTone(780, 0.14, 'sine', 0.09),
  shake:   () => nnTone(520, 0.35, 'sawtooth', 0.08, 120),
  sleep:   () => nnTone(440, 0.45, 'sine', 0.06, 200),
  wake:    () => nnTone(320, 0.28, 'sine', 0.07, 560)
};

// Set this to your deployed function's URL once you've deployed it, e.g.
// "https://your-site.vercel.app/api/chat". Leave it as '/api/chat' if the
// widget is hosted on the SAME domain as the function.
//
// ---- Making the AI backend sound human -----------------------------------
// This widget only sends { message, history } to your endpoint — the actual
// "personality" comes from the system prompt your backend gives the model.
// In your /api/chat function, pass something like this as the system
// instruction alongside the hostel facts (rooms/fees/rules/contact):
//
//   You are the friendly front-desk assistant for Nomad's Nest Hostel,
//   chatting with residents and prospective residents. Sound like a real,
//   warm staff member — not a policy document:
//   - Use contractions (it's, you'll, don't) and short, natural sentences.
//   - Vary your openers — don't start every reply the same way.
//   - Lead with the direct answer, then add context only if it helps.
//   - It's fine to show a little personality (a "no worries!", an emoji
//     now and then) but don't overdo it.
//   - If a question is genuinely outside hostel matters (rooms, fees,
//     rules, timings, contact), say so and point them to the warden.
//   - Never invent facts — stick to the details you're given below.
//   - Keep replies to 2-4 sentences unless the question needs a list.
//
// Feed it the same FAQ facts as NN_HOSTEL/NN_RULES_FAQS below (or your own
// source of truth) so it stays accurate while sounding conversational.
const NN_API_ENDPOINT = "/api/chat";
// If true, uses the smarter AI backend; falls back to local answers automatically
// if the request fails (e.g. endpoint not deployed yet, offline, quota hit).
const NN_USE_AI = true;

/* ========================================================= */

function nnPick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

const NN_GREETING_REPLIES = [
  `Hey, good to see you! 👋 I'm here to help with anything about <b>${NN_HOSTEL.name}</b> — rooms, fees, rules, timings, whatever you need. What's on your mind?`,
  `Hi there! 👋 What can I help you with today — rooms, fees, or something about the hostel rules?`,
  `Hey! Welcome. Ask away — I know most things about <b>${NN_HOSTEL.name}</b>, from fees to curfew timings.`
];
const NN_BYE_REPLIES = [
  "Anytime! Come back whenever you've got more questions — happy to help. 📚",
  "You're welcome! I'm here if anything else comes up. 🙂",
  "No problem at all — good luck, and reach out anytime!"
];
const NN_FALLBACK_REPLIES = [
  "Hmm, that one's outside what I know — best to check with the hostel warden directly for that. 🙂",
  "I'm not totally sure on that one, sorry! The warden's office would be able to help — want their contact?",
  "That's a bit outside my wheelhouse, but the warden can definitely sort it out for you."
];
const NN_SMALLTALK = [
  { keywords:["how","are","you","doing"], match:t => /how('?s| is| are)?\s*(it going|you doing|you)/i.test(t),
    replies:[
      "I'm doing well, thanks for asking! Just here helping folks with hostel questions. What can I do for you?",
      "Can't complain — running smooth today! What do you need help with?"
    ]},
  { keywords:["who","are","you","bot","human","real"], match:t => /(who|what)\s*are\s*you|are you (a )?(bot|human|real|ai)/i.test(t),
    replies:[
      "I'm the warden's desk bot for this hostel — think of me as the first stop for quick questions about rooms, fees, and rules. 🙂",
      "I'm an assistant here to help with hostel stuff — rooms, fees, timings, that sort of thing!"
    ]},
  { keywords:["thank","thanks"], match:t => /^\s*(thanks|thank you|thx|ty)\b/i.test(t),
    replies:["Happy to help! Anything else on your mind?", "Anytime! Let me know if something else comes up."]}
];

function nnFindSmallTalk(rawText){
  for (const st of NN_SMALLTALK) {
    if (st.match(rawText)) return nnPick(st.replies);
  }
  return null;
}

function nnFindAnswer(rawText){
  const text = rawText.toLowerCase();
  const tokens = new Set(nnTokenize(rawText));

  const isGreeting = NN_HOSTEL.greetings.some(g => g.includes(" ") ? text.includes(g) : tokens.has(g));
  const isBye = [...NN_HOSTEL.bye, ...NN_HOSTEL.thanks].some(g => g.includes(" ") ? text.includes(g) : tokens.has(g));
  if (isGreeting) return nnPick(NN_GREETING_REPLIES);
  if (isBye) return nnPick(NN_BYE_REPLIES);

  const smallTalk = nnFindSmallTalk(rawText);
  if (smallTalk) return smallTalk;

  const allFaqs = [...NN_HOSTEL.faqs, ...NN_RULES_FAQS];

  let best = null, bestScore = 0;
  for (const faq of allFaqs) {
    let score = 0;
    for (const kw of faq.keywords) {
      if (kw.includes(" ")) { if (text.includes(kw)) score += 2; }   // multi-word phrase
      else if (tokens.has(kw)) score += 1;                            // single-word token match
    }
    if (score > bestScore) { bestScore = score; best = faq; }
  }
  if (best && bestScore > 0) return best.answer;
  return nnPick(NN_FALLBACK_REPLIES);
}

// Rolling short-term memory sent to the AI so it can follow up on context.
let nnHistory = [];

async function nnGetAnswer(rawText){
  if (!NN_USE_AI) return nnFindAnswer(rawText);
  try {
    const res = await fetch(NN_API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: rawText, history: nnHistory })
    });
    if (!res.ok) throw new Error('bad response');
    const data = await res.json();
    if (!data.reply) throw new Error('no reply');

    nnHistory.push({ role: 'user', parts: [{ text: rawText }] });
    nnHistory.push({ role: 'model', parts: [{ text: data.reply }] });
    if (nnHistory.length > 12) nnHistory = nnHistory.slice(-12); // keep it short

    return data.reply;
  } catch (err) {
    // AI backend not set up yet, offline, or rate-limited — fall back silently.
    return nnFindAnswer(rawText);
  }
}

(function(){
  const launcherWrap = document.getElementById('nn-chat-launcher-wrap');
  const launcher = document.getElementById('nn-chat-launcher');
  const eyesTrack = launcher.querySelector('.nn-bot-eyes-track');
  const antenna = launcher.querySelector('.nn-bot-antenna');
  const panel = document.getElementById('nn-chat-panel');
  const closeBtn = document.getElementById('nn-chat-close');
  const body = document.getElementById('nn-chat-body');
  const input = document.getElementById('nn-chat-input');
  const sendBtn = document.getElementById('nn-chat-send');

  /* ---------- Drag the launcher anywhere on screen (+ shake detection) ---------- */
  let dragging = false, moved = false, startX, startY, startLeft, startTop;
  let lastX = null, lastDx = 0, reversalCount = 0, lastReversalReset = 0;

  function clampToViewport(left, top){
    const size = launcherWrap.offsetWidth;
    const maxLeft = window.innerWidth - size - 6;
    const maxTop = window.innerHeight - size - 6;
    return {
      left: Math.min(Math.max(6, left), maxLeft),
      top: Math.min(Math.max(6, top), maxTop)
    };
  }

  function pointerDown(x, y){
    dragging = true; moved = false;
    startX = x; startY = y; lastX = x; lastDx = 0; reversalCount = 0; lastReversalReset = Date.now();
    const rect = launcherWrap.getBoundingClientRect();
    startLeft = rect.left; startTop = rect.top;
    launcher.classList.add('nn-dragging');
    wake();
  }
  function pointerMove(x, y){
    if (!dragging) return;
    const dx = x - startX, dy = y - startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
    const { left, top } = clampToViewport(startLeft + dx, startTop + dy);
    launcherWrap.style.left = left + 'px';
    launcherWrap.style.top = top + 'px';

    // shake detection: count quick left-right direction reversals
    const stepDx = x - lastX;
    if (Math.abs(stepDx) > 3) {
      if (lastDx !== 0 && Math.sign(stepDx) !== Math.sign(lastDx)) reversalCount++;
      lastDx = stepDx;
    }
    lastX = x;
    const now = Date.now();
    if (now - lastReversalReset > 700) { reversalCount = 0; lastReversalReset = now; }
    if (reversalCount >= 3) { triggerShake(); reversalCount = 0; }
  }
  function pointerUp(){
    if (!dragging) return;
    dragging = false;
    launcher.classList.remove('nn-dragging');
    if (!moved) openPanel();      // it was a tap, not a drag
    else positionPanelNearLauncher();
  }

  function triggerShake(){
    launcher.classList.remove('nn-shake'); // restart animation if already running
    void launcher.offsetWidth;             // force reflow so the animation replays
    launcher.classList.add('nn-dizzy', 'nn-shake');
    nnSfx.shake();
    setTimeout(() => launcher.classList.remove('nn-dizzy', 'nn-shake'), 700);
  }

  /* ---------- Eyes follow the cursor ---------- */
  function updateEyeTracking(mx, my){
    if (!eyesTrack) return;
    const rect = launcher.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = mx - cx, dy = my - cy;
    const dist = Math.hypot(dx, dy) || 1;
    const pull = Math.min(1, dist / 250);
    const maxOffset = 0.55; // svg user-units
    const nx = (dx / dist) * pull * maxOffset;
    const ny = (dy / dist) * pull * maxOffset;
    eyesTrack.style.transform = `translate(${nx}px, ${ny}px)`;
  }
  window.addEventListener('mousemove', e => updateEyeTracking(e.clientX, e.clientY), { passive:true });

  /* ---------- Sparkle burst (used when the chat opens) ---------- */
  function burstSparkles(){
    const rect = launcher.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    const colors = ['#7FE0C9', '#E3A23C', '#D9634A'];
    for (let i = 0; i < 8; i++){
      const s = document.createElement('span');
      s.className = 'nn-sparkle';
      const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.4;
      const dist = 34 + Math.random() * 18;
      s.style.setProperty('--nx', Math.cos(angle) * dist + 'px');
      s.style.setProperty('--ny', Math.sin(angle) * dist + 'px');
      s.style.left = cx + 'px';
      s.style.top = cy + 'px';
      s.style.background = colors[i % colors.length];
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 750);
    }
  }

  launcher.addEventListener('mousedown', e => { pointerDown(e.clientX, e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', pointerUp);

  launcher.addEventListener('touchstart', e => {
    const t = e.touches[0]; pointerDown(t.clientX, t.clientY);
  }, { passive:true });
  window.addEventListener('touchmove', e => {
    if (!dragging) return;
    const t = e.touches[0]; pointerMove(t.clientX, t.clientY);
  }, { passive:true });
  window.addEventListener('touchend', pointerUp);

  window.addEventListener('resize', () => {
    const rect = launcherWrap.getBoundingClientRect();
    const { left, top } = clampToViewport(rect.left, rect.top);
    launcherWrap.style.left = left + 'px';
    launcherWrap.style.top = top + 'px';
  });

  /* ---------- Idle sleep: robot dozes off after inactivity, wakes on interaction ---------- */
  const IDLE_MS = 20000; // time with no interaction before it falls asleep
  let idleTimer = null;

  function sleep(){
    launcher.classList.add('nn-sleepy');
    launcherWrap.classList.add('nn-wrap-sleepy');
    nnSfx.sleep();
  }
  function wake(){
    const wasSleeping = launcher.classList.contains('nn-sleepy');
    launcher.classList.remove('nn-sleepy');
    launcherWrap.classList.remove('nn-wrap-sleepy');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(sleep, IDLE_MS);
    if (wasSleeping) nnSfx.wake();
    nnEnsureAudio(); // unlock audio on the first real user gesture
  }
  ['mousedown','touchstart','keydown','click'].forEach(evt =>
    document.addEventListener(evt, wake, { passive:true })
  );
  wake(); // start the timer on page load

  /* ---------- Position the panel next to wherever the button is ---------- */
  function positionPanelNearLauncher(){
    const rect = launcherWrap.getBoundingClientRect();
    const panelW = 340, panelH = 480;
    let left = rect.left;
    let top = rect.top - panelH - 10;          // prefer opening above the button

    if (top < 10) top = rect.bottom + 10;       // not enough room above -> open below
    if (left + panelW > window.innerWidth - 10) left = window.innerWidth - panelW - 10;
    if (left < 10) left = 10;
    if (top + panelH > window.innerHeight - 10) top = window.innerHeight - panelH - 10;
    if (top < 10) top = 10;

    panel.style.left = left + 'px';
    panel.style.top = top + 'px';
  }

  function openPanel(){
    positionPanelNearLauncher();
    panel.classList.add('nn-open');
    burstSparkles();
    nnSfx.open();
    if (body.children.length === 0) {
      addMessage(`Hi! I'm the warden's desk bot for <b>${NN_HOSTEL.name}</b>. Ask me about hostel related question 📚`, 'bot');
      addChips();
    }
    input.focus();
  }

  /* ---------- Chat logic ---------- */
  function addMessage(text, sender){
    const div = document.createElement('div');
    div.className = 'nn-msg nn-' + sender;
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    if (sender === 'bot' && antenna) {
      antenna.classList.remove('nn-happy');
      void antenna.offsetWidth; // restart animation if already running
      antenna.classList.add('nn-happy');
      nnSfx.receive();
    }
  }
  function addChips(){
    const wrap = document.createElement('div');
    wrap.className = 'nn-chips';
    NN_ALL_TOPICS.forEach(topic => {
      const chip = document.createElement('button');
      chip.className = 'nn-chip';
      chip.textContent = topic.label;
      chip.onclick = () => {
        wake();
        addMessage(topic.label, 'user');
        nnSfx.send();
        showTyping();
        setTimeout(() => {
          hideTyping();
          addMessage(topic.answer, 'bot');
        }, 260); // tiny delay so it still feels like a reply, not an instant swap
      };
      wrap.appendChild(chip);
    });
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
  }
  function showTyping(){
    const t = document.createElement('div');
    t.className = 'nn-typing'; t.id = 'nn-typing-indicator';
    t.innerHTML = '<span></span><span></span><span></span>';
    body.appendChild(t); body.scrollTop = body.scrollHeight;
  }
  function hideTyping(){ const t = document.getElementById('nn-typing-indicator'); if (t) t.remove(); }

  // Longer replies "take longer to type" — mimics natural pacing instead of
  // an instant, robotic swap from typing dots to full answer.
  function nnTypingDelay(text){
    const len = (text || '').replace(/<[^>]+>/g, '').length;
    return 350 + Math.min(1400, len * 11) + Math.random() * 250;
  }

  function sendMessage(){
    const text = input.value.trim();
    if (!text) return;
    wake();
    addMessage(text, 'user');
    nnSfx.send();
    input.value = '';
    showTyping();
    nnGetAnswer(text).then(reply => {
      hideTyping();
      addMessage(reply, 'bot');
    });
  }

  const soundToggle = document.getElementById('nn-sound-toggle');
  soundToggle.addEventListener('click', () => {
    nnSoundOn = !nnSoundOn;
    soundToggle.textContent = nnSoundOn ? '🔊' : '🔇';
    nnEnsureAudio();
    if (nnSoundOn) nnSfx.open();
  });

  closeBtn.addEventListener('click', () => panel.classList.remove('nn-open'));
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
})();
</script>
