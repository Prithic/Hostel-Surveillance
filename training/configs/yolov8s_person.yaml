# YOLOv8s fine-tune defaults for GuardianAI person detection.
# Used by: python -m training.train
# Does not change the Sprint 1 webcam demo (models/yolov8n.pt).

model: yolov8s.pt
data: datasets/data.yaml

epochs: 50
imgsz: 640
batch: 16
patience: 20
workers: 4
device: cpu
optimizer: AdamW
lr0: 0.001
lrf: 0.01
weight_decay: 0.0005
warmup_epochs: 3
cos_lr: true

# Light augmentation — hostel cams are mostly static viewpoints
hsv_h: 0.015
hsv_s: 0.4
hsv_v: 0.3
degrees: 5.0
translate: 0.1
scale: 0.3
fliplr: 0.5
mosaic: 0.5

project: runs/detect
name: hostel_person_yolov8s
exist_ok: true
pretrained: true
plots: true
save: true
seed: 0
