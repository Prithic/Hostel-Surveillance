const NN_CHIPS = ["Room & fees","Mess timings","Curfew","Visitors"];

/* =========================================================
   RULES DATASET ÔÇö auto-generated from the uploaded CSV
   (tag, question, answer). Each tag became one FAQ entry
   whose "keywords" are the significant words pulled from all
   of its example questions, so the matcher recognizes many

const NN_RULES_FAQS = [
  { tag:"checkin_checkout", keywords:["check", "checkin", "checkout", "out", "timings"],
    answer:"Check-in time is 12:00 PM and check-out time is 11:00 AM. Late check-out may attract an additional charge." },

    answer:"Mess timings are: Breakfast 7:30\u20139:30 AM, Lunch 12:30\u20132:30 PM, Snacks 5:00\u20136:00 PM, Dinner 7:30\u20139:30 PM. Cooking in rooms is not permitted for safety reasons. Outside food may be consumed in designated common areas only." },

    answer:"High-wattage appliances such as heaters, induction cooktops, and immersion rods are not allowed in rooms due to fire safety and electrical load concerns. Low-wattage devices like phone chargers, laptops, and table lamps are permitted." },

    answer:"Laundry facilities are available on each floor from 6:00 AM to 9:00 PM. A laundry service is also available on request for an additional fee; details are available at the reception." },

const NN_STOPWORDS = new Set("a an the is are am was were be been being do does did i my me you your in on at to of for if can could should would will shall must have has had what when where who why how there here this that these those it its any allowed need needed permit permitted policy rule rules time times get got about with without into from as or and but not no yes so please tell during after before happen happens hostel".split(" "));

function nnTokenize(text){
  return text.toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(w => w.length > 1 && !NN_STOPWORDS.has(w));
}

// Set this to your deployed function's URL once you've deployed it, e.g.
// "https://your-site.vercel.app/api/chat". Leave it as '/api/chat' if the
// widget is hosted on the SAME domain as the function.
const NN_API_ENDPOINT = "/api/chat";
// If true, uses the smarter AI backend; falls back to local answers automatically
// if the request fails (e.g. endpoint not deployed yet, offline, quota hit).
const NN_USE_AI = true;

/* ========================================================= */

function nnFindAnswer(rawText){
  const text = rawText.toLowerCase();
  const tokens = new Set(nnTokenize(rawText));

  const isGreeting = NN_HOSTEL.greetings.some(g => g.includes(" ") ? text.includes(g) : tokens.has(g));
  const isBye = [...NN_HOSTEL.bye, ...NN_HOSTEL.thanks].some(g => g.includes(" ") ? text.includes(g) : tokens.has(g));
  if (isGreeting)
    return `Hey there! ­ƒæï I'm the warden's desk bot for <b>${NN_HOSTEL.name}</b>. Ask me about rooms, fees, mess timings, curfew, visitors, or any hostel rule.`;
  if (isBye)
    return "You're welcome! Feel free to ask if you have any more questions. ­ƒôÜ";

  const allFaqs = [...NN_HOSTEL.faqs, ...NN_RULES_FAQS];

  let best = null, bestScore = 0;
  for (const faq of allFaqs) {
    let score = 0;
    for (const kw of faq.keywords) {
      if (kw.includes(" ")) { if (text.includes(kw)) score += 2; }   // multi-word phrase
      else if (tokens.has(kw)) score += 1;                            // single-word token match
    }
    if (score > bestScore) { bestScore = score; best = faq; }
  }
  if (best && bestScore > 0) return best.answer;
  return "I don't have that one on file ÔÇö but the warden's office can help directly. Try asking about rooms, fees, mess timings, curfew, visitors, or any hostel rule!";
}

// Rolling short-term memory sent to the AI so it can follow up on context.
let nnHistory = [];

async function nnGetAnswer(rawText){
  if (!NN_USE_AI) return nnFindAnswer(rawText);
  try {
    const res = await fetch(NN_API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: rawText, history: nnHistory })
    });
    if (!res.ok) throw new Error('bad response');
    const data = await res.json();
    if (!data.reply) throw new Error('no reply');

    nnHistory.push({ role: 'user', parts: [{ text: rawText }] });
    nnHistory.push({ role: 'model', parts: [{ text: data.reply }] });
    if (nnHistory.length > 12) nnHistory = nnHistory.slice(-12); // keep it short

    return data.reply;
  } catch (err) {
    // AI backend not set up yet, offline, or rate-limited ÔÇö fall back silently.
    return nnFindAnswer(rawText);
  }
}

(function(){
  const launcher = document.getElementById('nn-chat-launcher');
  const panel = document.getElementById('nn-chat-panel');
  const closeBtn = document.getElementById('nn-chat-close');
  const body = document.getElementById('nn-chat-body');
  const input = document.getElementById('nn-chat-input');
  const sendBtn = document.getElementById('nn-chat-send');

  /* ---------- Drag the launcher anywhere on screen (+ shake detection) ---------- */
  let dragging = false, moved = false, startX, startY, startLeft, startTop;
  let lastX = null, lastDx = 0, reversalCount = 0, lastReversalReset = 0;

  function clampToViewport(left, top){
    const size = launcher.offsetWidth;
    const maxLeft = window.innerWidth - size - 6;
    const maxTop = window.innerHeight - size - 6;
    return {
      left: Math.min(Math.max(6, left), maxLeft),
      top: Math.min(Math.max(6, top), maxTop)
    };
  }

  function pointerDown(x, y){
    dragging = true; moved = false;
    startX = x; startY = y; lastX = x; lastDx = 0; reversalCount = 0; lastReversalReset = Date.now();
    const rect = launcher.getBoundingClientRect();
    startLeft = rect.left; startTop = rect.top;
    launcher.classList.add('nn-dragging');
    wake();
  }
  function pointerMove(x, y){
    if (!dragging) return;
    const dx = x - startX, dy = y - startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
    const { left, top } = clampToViewport(startLeft + dx, startTop + dy);
    launcher.style.left = left + 'px';
    launcher.style.top = top + 'px';

    // shake detection: count quick left-right direction reversals
    const stepDx = x - lastX;
    if (Math.abs(stepDx) > 3) {
      if (lastDx !== 0 && Math.sign(stepDx) !== Math.sign(lastDx)) reversalCount++;
      lastDx = stepDx;
    }
    lastX = x;
    const now = Date.now();
    if (now - lastReversalReset > 700) { reversalCount = 0; lastReversalReset = now; }
    if (reversalCount >= 3) { triggerShake(); reversalCount = 0; }
  }
  function pointerUp(){
    if (!dragging) return;
    dragging = false;
    launcher.classList.remove('nn-dragging');
    if (!moved) openPanel();      // it was a tap, not a drag
    else positionPanelNearLauncher();
  }

  function triggerShake(){
    launcher.classList.remove('nn-shake'); // restart animation if already running
    void launcher.offsetWidth;             // force reflow so the animation replays
    launcher.classList.add('nn-dizzy', 'nn-shake');
    setTimeout(() => launcher.classList.remove('nn-dizzy', 'nn-shake'), 700);
  }

  launcher.addEventListener('mousedown', e => { pointerDown(e.clientX, e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', pointerUp);

  launcher.addEventListener('touchstart', e => {
    const t = e.touches[0]; pointerDown(t.clientX, t.clientY);
  }, { passive:true });
  window.addEventListener('touchmove', e => {
    if (!dragging) return;
    const t = e.touches[0]; pointerMove(t.clientX, t.clientY);
  }, { passive:true });
  window.addEventListener('touchend', pointerUp);

  window.addEventListener('resize', () => {
    const rect = launcher.getBoundingClientRect();
    const { left, top } = clampToViewport(rect.left, rect.top);
    launcher.style.left = left + 'px';
    launcher.style.top = top + 'px';
  });

  /* ---------- Idle sleep: robot dozes off after inactivity, wakes on interaction ---------- */
  const IDLE_MS = 20000; // time with no interaction before it falls asleep
  let idleTimer = null;

  function sleep(){ launcher.classList.add('nn-sleepy'); }
  function wake(){
    launcher.classList.remove('nn-sleepy');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(sleep, IDLE_MS);
  }
  ['mousedown','touchstart','keydown','click'].forEach(evt =>
    document.addEventListener(evt, wake, { passive:true })
  );
  wake(); // start the timer on page load

  /* ---------- Position the panel next to wherever the button is ---------- */
  function positionPanelNearLauncher(){
    const rect = launcher.getBoundingClientRect();
    const panelW = 340, panelH = 480;
    let left = rect.left;
    let top = rect.top - panelH - 10;          // prefer opening above the button

    if (top < 10) top = rect.bottom + 10;       // not enough room above -> open below
    if (left + panelW > window.innerWidth - 10) left = window.innerWidth - panelW - 10;
    if (left < 10) left = 10;
    if (top + panelH > window.innerHeight - 10) top = window.innerHeight - panelH - 10;
    if (top < 10) top = 10;

    panel.style.left = left + 'px';
    panel.style.top = top + 'px';
  }

  function openPanel(){
    positionPanelNearLauncher();
    panel.classList.add('nn-open');
    if (body.children.length === 0) {
      addMessage(`Hi! I'm the warden's desk bot for <b>${NN_HOSTEL.name}</b>. Ask me anything about rooms, fees, mess, or rules ­ƒôÜ`, 'bot');
      addChips();
    }
    input.focus();
  }

  /* ---------- Chat logic ---------- */
  function addMessage(text, sender){
    const div = document.createElement('div');
    div.className = 'nn-msg nn-' + sender;
    div.innerHTML = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }
  function addChips(){
    const wrap = document.createElement('div');
    wrap.className = 'nn-chips';
    NN_CHIPS.forEach(label => {
      const chip = document.createElement('button');
      chip.className = 'nn-chip';
      chip.textContent = label;
      chip.onclick = () => { input.value = label; sendMessage(); };
      wrap.appendChild(chip);
    });
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
  }
  function showTyping(){
    const t = document.createElement('div');
    t.className = 'nn-typing'; t.id = 'nn-typing-indicator';
    t.innerHTML = '<span></span><span></span><span></span>';
    body.appendChild(t); body.scrollTop = body.scrollHeight;
  }
  function hideTyping(){ const t = document.getElementById('nn-typing-indicator'); if (t) t.remove(); }

  function sendMessage(){
    const text = input.value.trim();
    if (!text) return;
    wake();
    addMessage(text, 'user');
    input.value = '';
    showTyping();
    nnGetAnswer(text).then(reply => {
      hideTyping();
      addMessage(reply, 'bot');
    });
  }

  closeBtn.addEventListener('click', () => panel.classList.remove('nn-open'));
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
})();
</script>
